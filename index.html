    <!-- MAIN VIEWPORT -->
    <main class="main-content">
      
      <!-- TOP HEADER ROW -->
      <header class="top-header">
        <div class="page-title-section">
          <h1 class="page-title" id="rendered-title">Dashboard</h1>
          <span class="page-subtitle" id="rendered-subtitle">Quick view of your family ties and ledgers</span>
        </div>

        <div class="header-controls">
          <!-- Universal Smart Search -->
          <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" class="search-input" id="global-search" placeholder="Search person, event, gift, expense...">
            
            <!-- Live Search Popover -->
            <div class="search-results-overlay" id="search-results">
              <!-- Rendered dynamically -->
            </div>
          </div>

          <!-- Quick Theme Toggle -->
          <button class="icon-btn" id="theme-toggle" title="Toggle Theme">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>

          <!-- Quick Language Selector -->
          <select class="lang-select" id="lang-select">
            <option value="en">English</option>
            <option value="mr">मराठी</option>
          </select>
        </div>
      </header>

      <!-- VIEW PANES CONTAINER -->
      <section class="view-wrapper" id="app-view">
        <!-- Rendered by JavaScript dynamically -->
      </section>

    </main>

  </div>

  <!-- DYNAMIC MODAL ENGINE -->
  <div class="modal-overlay" id="global-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Form</h3>
        <button class="modal-close" id="modal-close-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div id="modal-content">
        <!-- Rendered dynamically -->
      </div>
    </div>
